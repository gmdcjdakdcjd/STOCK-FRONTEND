server {
    listen 80;
    server_name localhost;

    # React 정적 빌드 파일 배포 설정
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 1. FastAPI 스크리너 백엔드 라우팅 (교집합 연산 API 전용 프록시)
    location /api/screener/ {
        proxy_pass http://finstack-screener-api:8000/api/screener/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Spring Boot 메인 백엔드 라우팅 (KODEX/TIGER ETF Summary, holdings API 프록시)
    location /api/ {
        proxy_pass http://stock-backend:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
